name: Compile GH-AW Workflows
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/*.md'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Set up gh-aw CLI
        uses: github/gh-aw-actions/setup-cli@5c2fe865bb4dc46e1450f6ee0d0541d759aea73a # v0.79.6
        with:
          version: v0.79.6
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Compile GH-AW source workflows
        run: gh aw compile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit compiled lock files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/*.lock.yml
          if git diff --cached --quiet; then
            echo "No lock file changes to commit."
            exit 0
          fi
          git commit -m "ci: compile GH-AW lock files [skip ci]"
          git push