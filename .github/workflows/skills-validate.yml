name: Validate Skill Outputs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-skill-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify lock exists
        run: test -f .github/skills/skills.lock.json

      - name: Verify manifest exists
        run: test -f .github/skills/skills-manifest.json

      - name: Verify contracts exist
        run: test -d .github/skills/contracts
